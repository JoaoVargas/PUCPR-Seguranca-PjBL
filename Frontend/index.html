<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HealthAuth - Login</title>
  <link rel="stylesheet" href="./assets/css/base.css" />
  <link rel="stylesheet" href="./assets/css/index.css" />
</head>

<body>
  <div class="card">
    <div class="card-header">
      <div class="logo">🏥</div>
      <h1>HealthAuth</h1>
      <p>Plataforma de Autenticacao Segura</p>
    </div>

    <div class="tabs">
      <button class="tab-btn active" data-tab="login" type="button">Entrar</button>
      <button class="tab-btn" data-tab="register" type="button">Cadastrar</button>
    </div>

    <section id="panel-login" class="tab-panel active">
      <div id="login-alert" class="alert"></div>

      <div class="form-group">
        <label for="login-email">E-mail</label>
        <input type="email" id="login-email" placeholder="seu@email.com" autocomplete="email" />
        <div class="field-error" id="login-email-err"></div>
      </div>

      <div class="form-group">
        <label for="login-password">Senha</label>
        <input type="password" id="login-password" placeholder="********" autocomplete="current-password" />
        <div class="field-error" id="login-pass-err"></div>
      </div>

      <button class="btn" id="login-btn" type="button">Entrar</button>

      <p class="security-note">Token armazenado apenas em memoria</p>
    </section>

    <section id="panel-register" class="tab-panel">
      <div id="reg-alert" class="alert"></div>

      <div class="form-group">
        <label for="reg-name">Nome completo</label>
        <input type="text" id="reg-name" placeholder="Maria da Silva" autocomplete="name" />
        <div class="field-error" id="reg-name-err"></div>
      </div>

      <div class="form-group">
        <label for="reg-email">E-mail</label>
        <input type="email" id="reg-email" placeholder="seu@email.com" autocomplete="email" />
        <div class="field-error" id="reg-email-err"></div>
      </div>

      <div class="form-group">
        <label for="reg-password">Senha</label>
        <input type="password" id="reg-password" placeholder="Minimo 8 caracteres" autocomplete="new-password" />
        <div class="strength-bar">
          <div class="strength-fill" id="strength-fill"></div>
        </div>
        <div class="strength-label" id="strength-label">Digite uma senha</div>
        <div class="field-error" id="reg-pass-err"></div>
      </div>

      <div class="form-group">
        <label for="reg-confirm">Confirmar senha</label>
        <input type="password" id="reg-confirm" placeholder="Repita a senha" autocomplete="new-password" />
        <div class="field-error" id="reg-confirm-err"></div>
      </div>

      <button class="btn" id="reg-btn" type="button">Criar conta</button>

      <p class="security-note">Senha enviada com hash - nunca em texto claro</p>
    </section>
  </div>

  <script src="./env.js"></script>
  <script type="module" src="./assets/js/index-page.js"></script>
</body>

</html>
